<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>실시간 채팅</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Nickname Modal -->
  <div id="nickname-modal" class="modal-overlay">
    <div class="modal">
      <h2>💬 채팅 입장</h2>
      <p>사용할 닉네임을 입력하세요</p>
      <input type="text" id="nickname-input" placeholder="닉네임 (최대 20자)" maxlength="20" autocomplete="off" />
      <button id="nickname-btn">입장하기</button>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="hidden">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>💬 채팅</h1>
        <span id="my-nickname" class="my-nickname"></span>
      </div>

      <div class="sidebar-section">
        <div class="section-title">
          채팅방
          <button id="create-room-btn" class="icon-btn" title="새 채팅방 만들기">+</button>
        </div>
        <div id="room-list" class="room-list"></div>
      </div>

      <!-- Create Room Form -->
      <div id="create-room-form" class="create-room-form hidden">
        <input type="text" id="room-name-input" placeholder="채팅방 이름" maxlength="30" />
        <div class="form-actions">
          <button id="create-room-submit">만들기</button>
          <button id="create-room-cancel" class="btn-secondary">취소</button>
        </div>
      </div>
    </aside>

    <!-- Chat Area -->
    <main class="chat-area">
      <!-- No Room Selected -->
      <div id="no-room" class="no-room">
        <div class="no-room-icon">💬</div>
        <p>채팅방을 선택하거나 새로 만드세요</p>
      </div>

      <!-- Room View -->
      <div id="room-view" class="hidden">
        <div class="chat-header">
          <div class="chat-header-left">
            <span id="current-room-name" class="room-title"></span>
          </div>
          <div class="chat-header-right">
            <span id="online-count" class="online-count"></span>
            <button id="leave-room-btn" class="leave-btn">나가기</button>
          </div>
        </div>

        <div class="chat-body">
          <!-- Messages -->
          <div id="messages" class="messages"></div>

          <!-- Typing Indicator -->
          <div id="typing-indicator" class="typing-indicator hidden"></div>
        </div>

        <!-- Online Users Panel -->
        <div class="online-panel">
          <div class="online-panel-title">온라인</div>
          <div id="online-users" class="online-users"></div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
          <input type="text" id="message-input" placeholder="메시지를 입력하세요..." maxlength="1000" autocomplete="off" />
          <button id="send-btn">전송</button>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
